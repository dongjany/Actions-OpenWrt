name: Update Checker

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      build_2410: ${{ steps.check_update.outputs.build_2410 }}
      build_2512: ${{ steps.check_update.outputs.build_2512 }}
    steps:
      - uses: actions/checkout@v4

      - name: Get 24.10 latest commit
        id: hash2410
        run: |
          git clone --depth 1 https://github.com/Lienol/openwrt -b 24.10 tmp
          echo "hash=$(cd tmp && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          rm -rf tmp

      - name: Get 25.12 latest commit
        id: hash2512
        run: |
          git clone --depth 1 https://github.com/Lienol/openwrt -b 25.12 tmp
          echo "hash=$(cd tmp && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          rm -rf tmp

      - name: Restore last commit cache
        uses: actions/cache/restore@v4
        with:
          path: .hash
          key: openwrt-hash
          fail-on-cache-miss: false

      - name: Check update & compare commits
        id: check_update
        run: |
          OLD_HASH=$(cat .hash 2>/dev/null || echo "")
          NEW_2410=${{ steps.hash2410.outputs.hash }}
          NEW_2512=${{ steps.hash2512.outputs.hash }}

          # 判断 24.10 是否需要构建
          if [ -z "$OLD_HASH" ] || [ "$NEW_2410" != "$(echo $OLD_HASH | cut -d' ' -f1)" ]; then
            echo "build_2410=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_2410=false" >> "$GITHUB_OUTPUT"
          fi

          # 判断 25.12 是否需要构建
          if [ -z "$OLD_HASH" ] || [ "$NEW_2512" != "$(echo $OLD_HASH | cut -d' ' -f2)" ]; then
            echo "build_2512=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_2512=false" >> "$GITHUB_OUTPUT"
          fi

          # 保存最新 commit
          echo "$NEW_2410 $NEW_2512" > .hash

      - name: Save new commit cache
        uses: actions/cache/save@v4
        with:
          path: .hash
          key: openwrt-hash

  # 24.10 分支自动构建
  build-2410:
    needs: check
    if: ${{ needs.check.outputs.build_2410 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 24.10 build
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ github.token }}
          event-type: Source_Code_Update
          client-payload: '{"build_branch":"24.10"}'

  # 25.12 分支自动构建
  build-2512:
    needs: check
    if: ${{ needs.check.outputs.build_2512 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 25.12 build
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ github.token }}
          event-type: Source_Code_Update
          client-payload: '{"build_branch":"25.12"}'

  # 自动清理旧工作流记录
  clean:
    needs: [build-2410, build-2512]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 3
