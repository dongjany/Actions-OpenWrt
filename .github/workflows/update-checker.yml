name: Update Checker

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      build_2410: ${{ steps.check_update.outputs.build_2410 }}
      build_2512: ${{ steps.check_update.outputs.build_2512 }}
    steps:
      - uses: actions/checkout@v4

      # 获取最新 commit
      - name: Get 24.10 hash
        id: hash2410
        run: |
          git clone --depth 1 https://github.com/Lienol/openwrt -b 24.10 tmp
          echo "hash=$(cd tmp && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          rm -rf tmp

      - name: Get 25.12 hash
        id: hash2512
        run: |
          git clone --depth 1 https://github.com/Lienol/openwrt -b 25.12 tmp
          echo "hash=$(cd tmp && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          rm -rf tmp

      # 读取缓存
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: .hash
          key: openwrt-hash

      # 核心判断（极简）
      - name: Check update
        id: check_update
        run: |
          OLD=$(cat .hash 2>/dev/null || echo "")
          NEW2410=${{ steps.hash2410.outputs.hash }}
          NEW2512=${{ steps.hash2512.outputs.hash }}

          # 判断 24.10
          if [ -z "$OLD" ] || [ "$NEW2410" != "$(echo $OLD | cut -d' ' -f1)" ]; then
            echo "build_2410=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_2410=false" >> "$GITHUB_OUTPUT"
          fi

          # 判断 25.12
          if [ -z "$OLD" ] || [ "$NEW2512" != "$(echo $OLD | cut -d' ' -f2)" ]; then
            echo "build_2512=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_2512=false" >> "$GITHUB_OUTPUT"
          fi

          # 保存新哈希
          echo "$NEW2410 $NEW2512" > .hash

      - name: Save cache
        uses: actions/cache/save@v4
        with:
          path: .hash
          key: openwrt-hash

  # 构建 24.10
  build-2410:
    needs: check
    if: ${{ needs.check.outputs.build_2410 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 24.10 build
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ github.token }}
          event-type: Source Code Update
          client-payload: '{"build_branch":"24.10"}'

  # 构建 25.12
  build-2512:
    needs: check
    if: ${{ needs.check.outputs.build_2512 == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 25.12 build
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ github.token }}
          event-type: Source Code Update
          client-payload: '{"build_branch":"25.12"}'

  # 清理旧记录
  clean:
    needs: [build-2410, build-2512]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 3
