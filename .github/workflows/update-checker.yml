name: Update Checker

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      build_branches: ${{ steps.check_update.outputs.build_branches }}
    steps:
      - uses: actions/checkout@v4

      # 获取 24.10 最新 commit
      - name: Get 24.10 latest hash
        id: get2410
        run: |
          git clone --depth 1 https://github.com/Lienol/openwrt -b 24.10 tmp
          echo "hash=$(cd tmp && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          rm -rf tmp

      # 获取 25.12 最新 commit
      - name: Get 25.12 latest hash
        id: get2512
        run: |
          git clone --depth 1 https://github.com/Lienol/openwrt -b 25.12 tmp
          echo "hash=$(cd tmp && git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          rm -rf tmp

      # 恢复缓存
      - name: Restore last hash cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .hash_2410
            .hash_2512
          key: branch-hash-${{ github.sha }}
          restore-keys: |
            branch-hash-

      # 核心判断：支持多分支
      - name: Check update and set output
        id: check_update
        run: |
          NEW_2410=${{ steps.get2410.outputs.hash }}
          NEW_2512=${{ steps.get2512.outputs.hash }}
          OLD_2410=$(cat .hash_2410 2>/dev/null || true)
          OLD_2512=$(cat .hash_2512 2>/dev/null || true)

          echo "OLD 24.10: $OLD_2410"
          echo "NEW 24.10: $NEW_2410"
          echo "OLD 25.12: $OLD_2512"
          echo "NEW 25.12: $NEW_2512"

          BUILD_BRANCHES=()

          # 首次运行或有更新
          if [ -z "$OLD_2410" ] || [ "$NEW_2410" != "$OLD_2410" ]; then
            BUILD_BRANCHES+=("24.10")
          fi

          if [ -z "$OLD_2512" ] || [ "$NEW_2512" != "$OLD_2512" ]; then
            BUILD_BRANCHES+=("25.12")
          fi

          # 保存新哈希
          echo "$NEW_2410" > .hash_2410
          echo "$NEW_2512" > .hash_2512

          # 输出 JSON 数组
          echo "build_branches=${BUILD_BRANCHES[@]}" >> "$GITHUB_OUTPUT"
          echo "需要构建的分支：${BUILD_BRANCHES[@]}"

      # 保存新缓存（key 每次变化，确保能更新）
      - name: Save new hash
        uses: actions/cache/save@v4
        with:
          path: |
            .hash_2410
            .hash_2512
          key: branch-hash-${{ github.sha }}

  # 遍历分支触发编译
  trigger-build:
    needs: check
    if: ${{ needs.check.outputs.build_branches != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(format('["{0}"]', join(needs.check.outputs.build_branches, '","'))) }}
    steps:
      - name: Trigger build for ${{ matrix.branch }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ github.token }}
          event-type: Source_Code_Update
          client-payload: |
            {
              "build_branch": "${{ matrix.branch }}"
            }

      # 清理旧运行记录
      - name: Clean old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 3
